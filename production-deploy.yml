name: Deploy to Production

on:
  push:
    branches:
      - main   # production deploy happens only from main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production   # can add manual approval in GitHub settings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PRODUCTION_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PRODUCTION_AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ secrets.PRODUCTION_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload build to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.PRODUCTION_S3_BUCKET }} --delete \
            --cache-control "public,max-age=31536000,immutable"

          aws s3 cp frontend/dist/index.html \
            s3://${{ secrets.PRODUCTION_S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PRODUCTION_CF_DIST_ID }} \
            --paths "/*"

      - name: Deploy backend (Django)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.PRODUCTION_EC2_SSH_KEY }}
          script: |
            set -e

            cd /srv/symplichain

            git pull origin main

            source venv/bin/activate

            pip install -r requirements.txt -q

            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            sudo systemctl restart gunicorn
            sudo systemctl restart celery
            sudo systemctl reload nginx
